<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nicat & Liana - Toy Xatirələri</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/images/logo.png">
  <style>
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      overflow: hidden;
      background: #0a0a0a;
    }

    .hero-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('/images/hero-bg.png') center/cover no-repeat;
      filter: brightness(0.4);
      z-index: 0;
    }

    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0.3) 0%,
        rgba(0,0,0,0.1) 40%,
        rgba(0,0,0,0.3) 100%
      );
      z-index: 1;
    }

    .hero-pattern {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: url('/images/pattern.png') repeat;
      opacity: 0.05;
      z-index: 2;
    }

    .hero-content {
      position: relative;
      z-index: 3;
      padding: 2rem;
      max-width: 600px;
    }

    .hero-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      border: 3px solid rgba(184, 134, 11, 0.6);
      padding: 5px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
    }

    .hero-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: 50%;
    }

    .hero-ornament {
      font-size: 1.5rem;
      color: var(--primary-light);
      margin-bottom: 0.5rem;
      letter-spacing: 12px;
      opacity: 0.8;
    }

    .hero-names {
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: 4rem;
      color: #fff;
      margin-bottom: 0.5rem;
      font-weight: 400;
      letter-spacing: 6px;
      line-height: 1.2;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }

    .hero-ampersand {
      font-size: 2.5rem;
      color: var(--primary-light);
      display: block;
      margin: 0.25rem 0;
      font-style: italic;
    }

    .hero-divider {
      width: 100px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary-light), transparent);
      margin: 1.5rem auto;
    }

    .hero-message {
      font-size: 1.15rem;
      color: rgba(255,255,255,0.85);
      margin: 1.5rem auto;
      font-style: italic;
      max-width: 400px;
    }

    .hero-dates {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin: 2rem 0;
      flex-wrap: wrap;
    }

    .hero-date-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      min-width: 200px;
      transition: all 0.3s ease;
      overflow: hidden;
      position: relative;
    }

    .hero-date-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 80px;
      background-size: cover;
      background-position: center;
      opacity: 0.3;
      z-index: 0;
    }

    .hero-date-card.georgia::before {
      background-image: url('/images/georgia.png');
    }

    .hero-date-card.turkey::before {
      background-image: url('/images/turkey.png');
    }

    .hero-date-card:hover {
      border-color: var(--primary-light);
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(184,134,11,0.2);
      background: rgba(255,255,255,0.15);
    }

    .hero-date-card > * {
      position: relative;
      z-index: 1;
    }

    .hero-date-flag {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .hero-date-location {
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
    }

    .hero-date-value {
      font-size: 0.9rem;
      color: var(--primary-light);
      margin-top: 0.3rem;
      font-weight: 500;
    }

    .hero-instruction {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 2rem;
      max-width: 380px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      border: none;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 4px 25px rgba(184, 134, 11, 0.4);
    }

    .hero-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 35px rgba(184, 134, 11, 0.5);
    }

    .hero-footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }

    @media (max-width: 480px) {
      .hero-names {
        font-size: 2.8rem;
        letter-spacing: 3px;
      }
      .hero-dates {
        flex-direction: column;
        align-items: center;
      }
      .hero-date-card {
        width: 100%;
        max-width: 250px;
      }
      .hero-logo {
        width: 60px;
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-pattern"></div>

    <div class="hero-content">
      <div class="hero-logo">
        <img src="/images/logo.png" alt="N&L">
      </div>
      <div class="hero-ornament">&#10047; &#10047; &#10047;</div>
      <h1 class="hero-names">
        Nicat
        <span class="hero-ampersand">&</span>
        Liana
      </h1>
      <div class="hero-divider"></div>
      <p class="hero-message">
        Toyumuzu xüsusi edən xatirələrinizi bizimlə paylaşın
      </p>

      <div class="hero-dates">
        <div class="hero-date-card georgia">
          <div class="hero-date-flag">&#127468;&#127466;</div>
          <div class="hero-date-location">Gürcüstan</div>
          <div class="hero-date-value">14 İyun 2026</div>
        </div>
        <div class="hero-date-card turkey">
          <div class="hero-date-flag">&#127481;&#127479;</div>
          <div class="hero-date-location">Türkiyə</div>
          <div class="hero-date-value">21 İyun 2026</div>
        </div>
      </div>

      <p class="hero-instruction">
        QR kodu oxudaraq şəkil və videolarınızı yükləyə bilərsiniz
      </p>
      <a href="/upload.html" class="hero-btn">
        &#128247; Xatirələrini Paylaş
      </a>
      <div class="hero-footer">
        <p>&#10084; Sevgi ilə</p>
      </div>
    </div>
  </div>
</body>
</html>
